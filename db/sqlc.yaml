version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "migrations/001_initial.up.sql"
      - "migrations/002_open_visit_uniqueness.up.sql"
      - "migrations/003_member_auth_and_sessions.up.sql"
    queries: "queries"
    gen:
      go:
        package: "store"
        out: "../internal/store"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
