version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "migrations/001_initial.up.sql"
      - "migrations/002_open_visit_uniqueness.up.sql"
      - "migrations/003_member_auth_and_sessions.up.sql"
      - "migrations/004_visit_departure_tracking.up.sql"
      - "migrations/005_workout_runtime.up.sql"
      - "migrations/006_lobby_membership_runtime.up.sql"
      - "migrations/007_match_preview_runtime.up.sql"
      - "migrations/008_sport_substrate_runtime.up.sql"
      - "migrations/009_competition_container_runtime.up.sql"
      - "migrations/010_competition_execution_runtime.up.sql"
      - "migrations/011_competition_history_runtime.up.sql"
      - "migrations/012_planner_runtime_substrate.up.sql"
      - "migrations/013_coaching_feedback_runtime.up.sql"
      - "migrations/014_nutrition_runtime_substrate.up.sql"
      - "migrations/015_presence_runtime.up.sql"
      - "migrations/016_competition_authz_runtime.up.sql"
      - "migrations/017_schedule_substrate_runtime.up.sql"
      - "migrations/018_booking_request_runtime.up.sql"
      - "migrations/019_approved_booking_cancellation.up.sql"
      - "migrations/020_public_booking_intake.up.sql"
      - "migrations/021_public_booking_receipts.up.sql"
      - "migrations/022_booking_request_edit_rebook.up.sql"
      - "migrations/023_competition_result_trust.up.sql"
      - "migrations/024_competition_rating_foundation.up.sql"
      - "migrations/025_competition_openskill_dual_run.up.sql"
      - "migrations/026_competition_ares_v2_preview.up.sql"
      - "migrations/027_competition_ares_input_watermark.up.sql"
      - "migrations/028_competition_analytics_foundation.up.sql"
      - "migrations/029_internal_tournament_runtime.up.sql"
      - "migrations/030_internal_tournament_cohesion.up.sql"
      - "migrations/031_competition_safety_reliability.up.sql"
      - "migrations/032_competition_safety_reliability_delete_guard.up.sql"
    queries: "queries"
    gen:
      go:
        package: "store"
        out: "../internal/store"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
